{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shanib Khan — Data Analyst specializing in MySQL, Power BI, Python, and data visualization.">
    <title>{% block title %}Shanib Khan — Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor-glow"></div>
    <div class="cursor-dot"></div>

    <!-- Particle Background -->
    <canvas id="particles-canvas"></canvas>

    <!-- Floating Geometric Shapes -->
    <div class="geo-shape geo-cube"></div>
    <div class="geo-shape geo-triangle"></div>
    <div class="geo-shape geo-circle"></div>
    <div class="geo-shape geo-diamond"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="{% url 'main:index' %}" class="logo">
                <i class="fas fa-chart-line"></i>
                <span>Shanib</span>
            </a>
            <ul class="nav-links">
                <li><a href="{% url 'main:index' %}">Home</a></li>
                <li><a href="{% url 'main:about' %}">About</a></li>
                <li><a href="{% url 'main:projects' %}">Projects</a></li>
                <li><a href="{% url 'main:skills' %}">Skills</a></li>
                <li><a href="{% url 'main:contact' %}">Contact</a></li>
                <li><button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span class="line"></span>
                <span class="line"></span>
                <span class="line"></span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <a href="{% url 'main:index' %}" class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>Shanib</span>
                </a>
                <ul class="footer-links">
                    <li><a href="https://github.com/shanib-techie" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a></li>
                    <li><a href="https://linkedin.com/in/shanibkhan" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a></li>
                    <li><a href="https://twitter.com/shanibkhan" target="_blank" aria-label="Twitter"><i class="fab fa-x-twitter"></i></a></li>
                </ul>
            </div>
            <p class="footer-copy">&copy; 2026 Shanib Khan. Built with data, analytics, and precision.</p>
        </div>
    </footer>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
